<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=3.0"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="S2-10" />
    <meta name="theme-color" content="#080808" />
    <title>S2-10 Timetable</title>

    <link
      href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />

    <!-- Firebase bootstrapping (module) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js"
      import {
        getAuth,
        onAuthStateChanged,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        signOut
      } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js"
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc
      } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"

      const firebaseConfig = {
        apiKey: "AIzaSyBwRcZ2qQDkkJUBX9Aa7CfiHK-KMOypcVg",
        authDomain: "timetable-a809c.firebaseapp.com",
        projectId: "timetable-a809c",
        storageBucket: "timetable-a809c.firebasestorage.app",
        messagingSenderId: "394886348730",
        appId: "1:394886348730:web:624f9b7991429780702783"
      }

      const app  = initializeApp(firebaseConfig)
      const auth = getAuth(app)
      const db   = getFirestore(app)

      window.__auth = auth
      window.__db   = db
      window.__fb   = {
        onAuthStateChanged,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        signOut,
        doc,
        getDoc,
        setDoc
      }
    </script>
  </head>

  <body>
    <div id="toast" class="toast hidden"></div>

    <div class="topbar">
      <div class="topbar-title" id="titleEl"></div>
      <div class="topbar-right">
        <div class="today-pill" id="todayPill"></div>

        <!-- Week toggle -->
        <div class="tog-group">
          <div class="tog-pill" id="pillWeek"></div>
          <button class="tog-btn" id="btnOdd" onclick="setWeek('odd')">ODD</button>
          <button class="tog-btn" id="btnEven" onclick="setWeek('even')">EVEN</button>
        </div>

        <!-- Sec toggle -->
        <div class="tog-group">
          <div class="tog-pill" id="pillSec"></div>
          <button class="tog-btn" id="btn4pm" onclick="setSec('lower')">4PM</button>
          <button class="tog-btn" id="btn6pm" onclick="setSec('upper')">6PM</button>
        </div>

        <!-- Settings button -->
        <div class="settings-btn" id="settingsBtn" title="Settings">⚙</div>
      </div>
    </div>

    <div class="now-bar" id="nowBar" style="display:none">
      <div class="now-dot"></div>
      <span class="now-label">NOW</span>
      <span class="now-subject" id="nowSubj"></span>
    </div>

    <div class="table-wrap" id="tableWrap"></div>

    <div class="bottom" id="btmEl"></div>

    <!-- SETTINGS PANEL -->
    <div class="s-overlay" id="sOverlay">
      <div class="s-panel" id="sPanel">
        <div class="s-head">
          <span>SETTINGS</span>
          <button class="s-close" id="settingsCloseBtn">✕ CLOSE</button>
        </div>

        <div class="s-section">
          <div class="s-sec-label">Account</div>

          <!-- Logged out view -->
          <div id="accLoggedOut" style="display:flex; flex-direction:column; gap:6px">
            <input
              id="authEmail"
              type="email"
              placeholder="SST email"
              style="width:100%; padding:6px 8px; border-radius:8px; border:1px solid rgba(255,255,255,.2); background:#050505; color:#ddd; font-family:'Space Mono',monospace; font-size:.65rem"
            />
            <input
              id="authPassword"
              type="password"
              placeholder="password"
              style="width:100%; padding:6px 8px; border-radius:8px; border:1px solid rgba(255,255,255,.2); background:#050505; color:#ddd; font-family:'Space Mono',monospace; font-size:.65rem"
            />
            <div style="display:flex; gap:8px">
              <button
                id="btnDoLogin"
                class="auth-btn"
                style="flex:1; background:#222; border:1px solid rgba(255,255,255,.25); border-radius:999px; padding:6px 0; color:#ddd; cursor:pointer; font-family:'VT323',monospace; letter-spacing:.08em; font-size:.75rem"
              >
                Log in
              </button>
              <button
                id="btnDoSignup"
                class="auth-btn"
                style="flex:1; background:#ff3b3b; border:1px solid rgba(255,255,255,.25); border-radius:999px; padding:6px 0; color:#fff; cursor:pointer; font-family:'VT323',monospace; letter-spacing:.08em; font-size:.75rem"
              >
                Sign up
              </button>
            </div>
          </div>

          <!-- Logged in view -->
          <div
            id="accLoggedIn"
            style="display:none; align-items:center; justify-content:space-between; gap:10px"
          >
            <div
              style="font-family:'Space Mono',monospace; font-size:.6rem; color:#aaa"
              id="authUserLabel"
            ></div>
            <button
              id="btnLogout"
              style="background:none; border:1px solid rgba(255,255,255,.25); border-radius:999px; padding:4px 10px; color:#ddd; cursor:pointer; font-family:'VT323',monospace; letter-spacing:.08em; font-size:.7rem"
            >
              Log out
            </button>
          </div>
        </div>

        <div class="s-section">
          <div class="s-sec-label">Highlight Colours</div>

          <div class="c-row">
            <span class="c-name">S&amp;W</span>
            <div class="c-swatch">
              <div class="c-preview" id="prvSw"></div>
              <input type="color" id="clrSw" value="#46b45a" />
            </div>
            <span class="c-hex" id="hexSw"></span>
            <button class="clr-clear-btn" data-key="sw">×</button>
          </div>

          <div class="c-row">
            <span class="c-name">CM(ADMT)</span>
            <div class="c-swatch">
              <div class="c-preview" id="prvCm"></div>
              <input type="color" id="clrCm" value="#c84646" />
            </div>
            <span class="c-hex" id="hexCm"></span>
            <button class="clr-clear-btn" data-key="cm">×</button>
          </div>

          <div class="c-row">
            <span class="c-name">CM(ICT)</span>
            <div class="c-swatch">
              <div class="c-preview" id="prvCmict"></div>
              <input type="color" id="clrCmict" value="#b446c8" />
            </div>
            <span class="c-hex" id="hexCmict"></span>
            <button class="clr-clear-btn" data-key="cmict">×</button>
          </div>

          <div class="c-row">
            <span class="c-name">BREAK</span>
            <div class="c-swatch">
              <div class="c-preview" id="prvBrk"></div>
              <input type="color" id="clrBrk" value="#ffffff" />
            </div>
            <span class="c-hex" id="hexBrk"></span>
            <button class="clr-clear-btn" data-key="brk">×</button>
          </div>
        </div>

        <div class="s-section">
          <div class="s-sec-label">Effects</div>
          <div class="g-row">
            <span class="g-label">Glow &amp; shadows</span>
            <label class="sw-wrap">
              <input type="checkbox" id="glowChk" checked />
              <div class="sw-track"></div>
              <div class="sw-thumb"></div>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Main app script -->
    <script src="script.js?v=5" defer></script>
  </body>
</html>
